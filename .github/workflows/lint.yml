name: Lint
on:
  push:
    branches:
      - master
      - release/**
  pull_request:
permissions:
  contents: read
defaults:
  run:
    shell: bash
concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true
jobs:
  golangci-lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.25"
          cache-dependency-path: "**/go.sum"
      - name: Compute lint targets
        id: lint-targets
        run: echo "targets=$(go work edit -json | jq -r '[.Use[].DiskPath | . + "/..."] | join(" ")')" >> $GITHUB_OUTPUT
      - name: golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # pin@v8.0
        with:
          version: v2.11.4
          args: --timeout=10m ${{ steps.lint-targets.outputs.targets }}
    timeout-minutes: 10
